<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin - DoodleDash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background-color: #f1f5f9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #334155; 
            overflow: hidden; /* Prevent body scroll, handle in containers */
        }
        
        .app-container { 
            display: flex; 
            height: 100vh; 
            height: 100dvh; /* Dynamic viewport for mobile browsers */
            overflow: hidden; 
        }

        .sidebar { 
            background: #0f172a; 
            color: #cbd5e1; 
            flex-shrink: 0; 
            transition: all 0.3s ease;
        }

        .nav-item { 
            cursor: pointer; 
            transition: 0.2s; 
            font-weight: 500; 
            border-radius: 8px; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .card { 
            border: none; 
            border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
            margin-bottom: 20px; 
            overflow: hidden; 
        }

        .card-header { 
            background: white; 
            border-bottom: 1px solid #e2e8f0; 
            font-weight: bold; 
            padding: 15px 20px; 
        }

        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
        
        canvas {
            max-width: 100%;
            height: auto !important;
            object-fit: contain;
        }

        /* Desktop & Tablet Layout */
        @media (min-width: 769px) {
            .app-container { flex-direction: row; }
            .sidebar { 
                width: 250px; 
                min-height: 100dvh; 
                padding-top: 2rem; 
                display: flex;
                flex-direction: column; 
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
                z-index: 10;
            }
            .nav-item { padding: 12px 20px; margin: 0 10px 5px 10px; display: flex; align-items: center; }
            .nav-item i { width: 25px; text-align: center; margin-right: 10px; font-size: 1.1rem; }
            .nav-item:hover { background: #1e293b; color: white; }
            .nav-item.active { background: #3b82f6; color: white; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3); }
            .sidebar-header { margin-bottom: 2rem; }
            .sidebar-footer { margin-top: auto; padding: 1rem; }
            .main-content { 
                flex-grow: 1; 
                overflow-y: auto; 
                height: 100dvh;
            }
        }

        /* Mobile Layout */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            
            /* Native App Style Bottom Navigation */
            .sidebar { 
                width: 100%; 
                display: flex;
                flex-direction: row; 
                justify-content: space-around; 
                align-items: center;
                padding: 8px 5px; 
                padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)); /* Support for iPhone Home Bar */
                box-shadow: 0 -4px 15px rgba(0,0,0,0.15); 
                z-index: 1050; 
                order: 2; /* Force to bottom */
            }
            
            .nav-item { 
                flex: 1; 
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center; 
                padding: 6px 2px; 
                margin: 0 2px; 
                font-size: 0.65rem; 
                white-space: nowrap; 
            }
            
            .nav-item i { 
                display: block; 
                font-size: 1.3rem; 
                margin-bottom: 3px; 
                margin-right: 0 !important; 
            }
            
            .nav-item:active { background: #1e293b; }
            .nav-item.active { 
                background: rgba(59, 130, 246, 0.15); 
                color: #60a5fa; 
            }
            
            .sidebar-header, .sidebar-footer { display: none !important; }
            
            .main-content { 
                order: 1; /* Top area */
                flex-grow: 1; 
                height: 0; /* Important for flex flex-grow scrolling */
                overflow-y: auto; 
                -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
                padding-bottom: 20px;
            }
            
            .card-header { padding: 12px; font-size: 1rem; }
            .p-md-4 { padding: 1rem !important; }
            
            /* Typography & Sizing adjustments for mobile */
            h3 { font-size: 1.4rem; }
            .table { font-size: 0.85rem; }
            .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
            .badge { font-size: 0.7rem; }
            .stat-card { padding: 1rem !important; }
            .stat-card h3 { font-size: 1.4rem; }
            .modal-dialog { margin: 0.5rem; align-items: flex-end; min-height: calc(100% - 1rem); } /* Lower modals slightly on mobile */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const Dashboard = ({ apiFetch }) => {
            const [stats, setStats] = useState(null);
            const [logs, setLogs] = useState([]);

            useEffect(() => {
                apiFetch('/stats').then(setStats);
                apiFetch('/audit').then(setLogs);
            }, []);

            if (!stats) return <div className="p-5 text-center"><div className="spinner-border text-primary"></div></div>;

            return (
                <div className="p-3 p-md-4">
                    <h3 className="fw-bold mb-4">System Overview</h3>
                    <div className="row g-2 g-md-3 mb-4">
                        <div className="col-6 col-md-3"><div className="card stat-card bg-primary text-white p-3 p-md-4 h-100 d-flex flex-column justify-content-center"><h6 className="opacity-75 small mb-1">Total Users</h6><h3 className="mb-0 fw-bold">{stats.totalUsers.toLocaleString()}</h3></div></div>
                        <div className="col-6 col-md-3"><div className="card stat-card bg-success text-white p-3 p-md-4 h-100 d-flex flex-column justify-content-center"><h6 className="opacity-75 small mb-1">Daily Active (DAU)</h6><h3 className="mb-0 fw-bold">{stats.dau.toLocaleString()}</h3></div></div>
                        <div className="col-6 col-md-3"><div className="card stat-card bg-warning text-dark p-3 p-md-4 h-100 d-flex flex-column justify-content-center"><h6 className="opacity-75 small mb-1">Credits Circ.</h6><h3 className="mb-0 fw-bold">{Number(stats.totalCredits).toLocaleString()}</h3></div></div>
                        <div className="col-6 col-md-3"><div className="card stat-card bg-danger text-white p-3 p-md-4 h-100 d-flex flex-column justify-content-center"><h6 className="opacity-75 small mb-1">Star Donations</h6><h3 className="mb-0 fw-bold">{stats.totalDonated.toLocaleString()} <i className="fas fa-star ms-1 fs-6"></i></h3></div></div>
                    </div>
                    <div className="row g-2 g-md-3 mb-4">
                        <div className="col-12 col-md-6"><div className="card stat-card bg-info text-dark p-3 p-md-4 h-100 d-flex flex-row justify-content-between align-items-center"><div><h6 className="opacity-75 mb-1">Active Game Rooms</h6><h2 className="mb-0 fw-bold">{stats.activeRooms}</h2></div><i className="fas fa-gamepad fs-1 opacity-50"></i></div></div>
                        <div className="col-12 col-md-6"><div className="card stat-card bg-dark text-white p-3 p-md-4 h-100 d-flex flex-row justify-content-between align-items-center"><div><h6 className="opacity-75 mb-1">Connected Sockets</h6><h2 className="mb-0 fw-bold">{stats.activeSockets}</h2></div><i className="fas fa-plug fs-1 opacity-50"></i></div></div>
                    </div>
                    
                    <div className="card">
                        <div className="card-header"><i className="fas fa-list me-2"></i>Admin Audit Log</div>
                        <div className="table-responsive p-0 p-md-3">
                            <table className="table table-hover align-middle mb-0" style={{minWidth: '500px'}}>
                                <thead className="table-light"><tr><th className="ps-3">Timestamp</th><th>Admin ID</th><th>Action</th><th className="pe-3">Details</th></tr></thead>
                                <tbody>
                                    {logs.map(l => (
                                        <tr key={l.id}>
                                            <td className="text-muted small ps-3">{new Date(l.created_at).toLocaleString()}</td>
                                            <td className="fw-bold">{l.admin_id}</td>
                                            <td><span className="badge bg-secondary">{l.action}</span></td>
                                            <td className="small font-monospace text-truncate pe-3" style={{maxWidth:'150px'}}>{l.details}</td>
                                        </tr>
                                    ))}
                                </tbody>
                                        
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const StylesManager = ({ apiFetch }) => {
            const [styles, setStyles] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);
            const [editModal, setEditModal] = useState(null);
            const [newStyle, setNewStyle] = useState({ class_name: '', is_premium: false, credit_price: 0, gem_price: 0, font_family: '', css_content: '', is_hidden: false });
            
            const loadStyles = () => apiFetch('/styles').then(setStyles);
            useEffect(() => { loadStyles(); }, []);

            // Dynamically load Fonts & CSS for accurate preview rendering
            useEffect(() => {
                if (!styles || styles.length === 0) return;
                
                const requiredFonts = new Set();
                let combinedCSS = "";
                
                styles.forEach(s => {
                    if (s.font_family) requiredFonts.add(s.font_family);
                    if (s.css_content) combinedCSS += `\n/* Loaded for ${s.id} */\n${s.css_content}`;
                });
                
                if (requiredFonts.size > 0) {
                    const fontFamilies = Array.from(requiredFonts).map(f => `family=${f.replace(/ /g, '+')}`).join('&');
                    const fontUrl = `https://fonts.googleapis.com/css2?${fontFamilies}&display=swap`;
                    
                    let linkTag = document.getElementById('dynamic-google-fonts');
                    if (!linkTag) {
                        linkTag = document.createElement('link');
                        linkTag.id = 'dynamic-google-fonts';
                        linkTag.rel = 'stylesheet';
                        document.head.appendChild(linkTag);
                    }
                    if (linkTag.href !== fontUrl) {
                        linkTag.href = fontUrl;
                    }
                }
                
                let styleTag = document.getElementById('dynamic-room-styles');
                if (!styleTag) {
                    styleTag = document.createElement('style');
                    styleTag.id = 'dynamic-room-styles';
                    document.head.appendChild(styleTag);
                }
                if (styleTag.innerHTML !== combinedCSS) {
                    styleTag.innerHTML = combinedCSS;
                }
            }, [styles]);

            const updateStyle = async (s) => {
                await apiFetch('/styles/update', 'POST', { 
                    id: s.id, 
                    credit_price: Number(s.credit_price), 
                    gem_price: Number(s.gem_price),
                    is_premium: Boolean(s.is_premium),
                    is_hidden: Boolean(s.is_hidden),
                    css_content: s.css_content,
                    class_name: s.class_name,
                    font_family: s.font_family
                });
                alert('Style updated globally!');
                loadStyles();
            };

            const toggleVisibility = async (s) => {
                const updatedStyle = { ...s, is_hidden: !s.is_hidden };
                await apiFetch('/styles/update', 'POST', { 
                    id: updatedStyle.id, 
                    credit_price: Number(updatedStyle.credit_price), 
                    gem_price: Number(updatedStyle.gem_price),
                    is_premium: Boolean(updatedStyle.is_premium),
                    is_hidden: Boolean(updatedStyle.is_hidden),
                    css_content: updatedStyle.css_content,
                    class_name: updatedStyle.class_name,
                    font_family: updatedStyle.font_family
                });
                loadStyles();
            };

            const deleteStyle = async (id) => {
                if (!window.confirm("Are you sure you want to completely delete this style?")) return;
                await apiFetch('/styles/delete', 'POST', { id });
                loadStyles();
            };

            const addNewStyle = async () => {
                if (!newStyle.class_name) return alert('Class name is required!');
                await apiFetch('/styles/add', 'POST', newStyle);
                setNewStyle({ class_name: '', is_premium: false, credit_price: 0, gem_price: 0, font_family: '', css_content: '', is_hidden: false });
                setShowAddForm(false);
                loadStyles();
            };

            return (
                <div className="p-3 p-md-4">
                    <div className="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                        <h3 className="fw-bold mb-0">Username Styles</h3>
                        <button className="btn btn-primary fw-bold shadow-sm" onClick={() => setShowAddForm(!showAddForm)}>
                            {showAddForm ? 'Cancel' : '+ Add New Style'}
                        </button>
                    </div>

                    <div className="alert alert-info py-2 small mb-4">Manage prices, tiers, and visibility for all in-game username styles. Dynamic CSS elements are injected directly to the client.</div>

                    {showAddForm && (
                        <div className="card shadow-sm border-0 mb-4 bg-white">
                            <div className="card-header bg-primary text-white"><i className="fas fa-plus-circle me-2"></i>Create New Name Style</div>
                            <div className="card-body">
                                <div className="row g-3">
                                    <div className="col-12 col-md-4">
                                        <label className="form-label small fw-bold">CSS Class Name *</label>
                                        <input type="text" className="form-control" placeholder="e.g. style-neon" value={newStyle.class_name} onChange={e => setNewStyle({...newStyle, class_name: e.target.value})} />
                                    </div>
                                    <div className="col-12 col-md-4">
                                        <label className="form-label small fw-bold">Google Font Family</label>
                                        <input type="text" className="form-control" placeholder="e.g. 'Press Start 2P'" value={newStyle.font_family} onChange={e => setNewStyle({...newStyle, font_family: e.target.value})} />
                                    </div>
                                    <div className="col-12 col-md-4 d-flex align-items-end">
                                        <div className="form-check form-switch mb-2">
                                            <input className="form-check-input" type="checkbox" id="addPremiumToggle" checked={newStyle.is_premium} onChange={e => setNewStyle({...newStyle, is_premium: e.target.checked})} />
                                            <label className="form-check-label fw-bold" htmlFor="addPremiumToggle">Is Premium Tier</label>
                                        </div>
                                    </div>
                                    <div className="col-6 col-md-4">
                                        <label className="form-label small fw-bold">Credit Price</label>
                                        <input type="number" className="form-control" value={newStyle.credit_price} onChange={e => setNewStyle({...newStyle, credit_price: e.target.value})} disabled={newStyle.is_premium} />
                                    </div>
                                    <div className="col-6 col-md-4">
                                        <label className="form-label small fw-bold">Gem Price</label>
                                        <input type="number" className="form-control" value={newStyle.gem_price} onChange={e => setNewStyle({...newStyle, gem_price: e.target.value})} />
                                    </div>
                                    <div className="col-12 col-md-4 d-flex align-items-end">
                                        <div className="form-check form-switch mb-2">
                                            <input className="form-check-input" type="checkbox" id="addHiddenToggle" checked={newStyle.is_hidden} onChange={e => setNewStyle({...newStyle, is_hidden: e.target.checked})} />
                                            <label className="form-check-label fw-bold text-danger" htmlFor="addHiddenToggle">Start Hidden</label>
                                        </div>
                                    </div>
                                    <div className="col-12">
                                        <label className="form-label small fw-bold">Custom CSS Code</label>
                                        <textarea className="form-control font-monospace" rows="4" placeholder=".style-neon { color: #fff; text-shadow: 0 0 5px #0f0; }" value={newStyle.css_content} onChange={e => setNewStyle({...newStyle, css_content: e.target.value})}></textarea>
                                    </div>
                                    <div className="col-12 text-end">
                                        <button className="btn btn-success fw-bold px-4 w-100 w-md-auto" onClick={addNewStyle}>Save New Style</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="card shadow-sm border-0">
                        <div className="table-responsive p-0 p-md-3">
                            <table className="table align-middle text-center mb-0" style={{minWidth: '800px'}}>
                                <thead className="table-light">
                                    <tr>
                                        <th className="ps-3">Style Preview</th>
                                        <th>CSS Class</th>
                                        <th>Tier Type</th>
                                        <th>Credits</th>
                                        <th>Gems</th>
                                        <th>Visibility</th>
                                        <th className="pe-3">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {styles.map(s => (
                                        <tr key={s.id} className={s.is_hidden ? 'opacity-50 bg-light' : ''}>
                                            <td className="fw-bold fs-5 bg-light rounded m-2 inline-block py-3 px-4 shadow-sm" style={{ minWidth: '150px' }}>
                                                <span className={s.class_name} data-name="DoodleDash">DoodleDash</span>
                                            </td>
                                            <td><code className="text-secondary bg-white px-2 py-1 rounded border shadow-sm">{s.class_name}</code></td>
                                            <td>
                                                <select className="form-select form-select-sm shadow-sm" value={s.is_premium ? 'true' : 'false'} onChange={e => setStyles(styles.map(st => st.id === s.id ? {...st, is_premium: e.target.value === 'true'} : st))}>
                                                    <option value="true">Premium</option>
                                                    <option value="false">Standard</option>
                                                </select>
                                            </td>
                                            <td>
                                                <input type="number" className="form-control form-control-sm mx-auto text-center" style={{width: '80px'}} 
                                                       value={s.credit_price} 
                                                       disabled={s.is_premium}
                                                       onChange={e => setStyles(styles.map(st => st.id === s.id ? {...st, credit_price: e.target.value} : st))} />
                                            </td>
                                            <td>
                                                <input type="number" className="form-control form-control-sm mx-auto text-center" style={{width: '80px'}} 
                                                       value={s.gem_price} 
                                                       onChange={e => setStyles(styles.map(st => st.id === s.id ? {...st, gem_price: e.target.value} : st))} />
                                            </td>
                                            <td>
                                                <button className={`btn btn-sm ${s.is_hidden ? 'btn-outline-danger' : 'btn-outline-success'} rounded-pill shadow-sm`} onClick={() => toggleVisibility(s)} title={s.is_hidden ? "Currently Hidden. Click to Show." : "Currently Visible. Click to Hide."}>
                                                    <i className={`fas ${s.is_hidden ? 'fa-eye-slash' : 'fa-eye'}`}></i> <span className="d-none d-md-inline ms-1">{s.is_hidden ? 'Hidden' : 'Visible'}</span>
                                                </button>
                                            </td>
                                            <td className="pe-3">
                                                <div className="btn-group shadow-sm">
                                                    <button className="btn btn-sm btn-info text-white" onClick={() => setEditModal(s)} title="Edit CSS & Details"><i className="fas fa-edit"></i></button>
                                                    <button className="btn btn-sm btn-primary fw-bold" onClick={() => updateStyle(s)} title="Save Inline Changes"><i className="fas fa-save"></i></button>
                                                    <button className="btn btn-sm btn-danger" onClick={() => deleteStyle(s.id)} title="Delete Style"><i className="fas fa-trash"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                    {styles.length === 0 && <tr><td colSpan="7" className="text-muted p-4">Loading styles...</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {editModal && (
                        <div className="modal d-block" style={{background: 'rgba(0,0,0,0.6)', zIndex: 1050}}>
                            <div className="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
                                <div className="modal-content border-0 shadow-lg rounded-4">
                                    <div className="modal-header bg-dark text-white p-3">
                                        <h5 className="modal-title fs-6"><i className="fas fa-code me-2"></i>Edit Style Attributes</h5>
                                        <button className="btn-close btn-close-white" onClick={() => setEditModal(null)}></button>
                                    </div>
                                    <div className="modal-body bg-light p-3 p-md-4 text-start">
                                        <div className="row g-3">
                                            <div className="col-12 col-md-6">
                                                <label className="form-label small fw-bold">CSS Class Name *</label>
                                                <input type="text" className="form-control" value={editModal.class_name} onChange={e => setEditModal({...editModal, class_name: e.target.value})} />
                                            </div>
                                            <div className="col-12 col-md-6">
                                                <label className="form-label small fw-bold">Google Font Family</label>
                                                <input type="text" className="form-control" value={editModal.font_family || ''} onChange={e => setEditModal({...editModal, font_family: e.target.value})} />
                                            </div>
                                            <div className="col-12">
                                                <label className="form-label small fw-bold">Custom CSS Code</label>
                                                <textarea className="form-control font-monospace" rows="5" value={editModal.css_content || ''} onChange={e => setEditModal({...editModal, css_content: e.target.value})}></textarea>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="modal-footer bg-light border-top-0 d-flex justify-content-end p-3">
                                        <button className="btn btn-secondary fw-bold" onClick={() => setEditModal(null)}>Cancel</button>
                                        <button className="btn btn-primary fw-bold px-4" onClick={async () => {
                                            await updateStyle(editModal);
                                            setEditModal(null);
                                        }}>Save Updates</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Moderation = ({ apiFetch }) => {
            const [search, setSearch] = useState('');
            const [users, setUsers] = useState([]);
            const [reports, setReports] = useState([]);
            const [proofModal, setProofModal] = useState(null);
            const [reportModalTab, setReportModalTab] = useState('reason');
            const [actionModal, setActionModal] = useState(null);
            
            const [reportFilter, setReportFilter] = useState('all');
            const [selectedProfile, setSelectedProfile] = useState(null);

            useEffect(() => { apiFetch('/reports').then(setReports); }, []);

            const doSearch = async () => {
                if(!search) return;
                const res = await apiFetch('/users/search', 'POST', { query: search });
                setUsers(res);
            };

            const fetchProfile = async (tgId, reportData = null) => {
                const res = await apiFetch('/users/search', 'POST', { query: tgId });
                if (res && res.length > 0) {
                    setSelectedProfile({ ...res[0], reportData });
                } else {
                    alert('User not found.');
                }
            };

            const openActionModal = (tgId, action, days, reportData = null) => {
                let defMsg = "";
                if (action === 'ban') defMsg = `You have been banned for ${days === 'perm' ? 'life' : days + ' days'} due to violations of our rules.`;
                if (action === 'mute') defMsg = `You have been muted for ${days} day(s) due to chat violations.`;
                if (action === 'unban' || action === 'unmute') defMsg = `Your restriction has been lifted.`;

                setActionModal({
                    tgId, action, days,
                    reporterId: reportData?.reporter_id,
                    reportId: reportData?.id,
                    message: defMsg
                });
            };

            const takeAction = async (data) => {
                await apiFetch('/users/action', 'POST', {
                    tgId: data.tgId,
                    action: data.action,
                    days: data.days,
                    message: data.message,
                    reporterId: data.reporterId,
                    reportId: data.reportId
                });
                setActionModal(null);
                setSelectedProfile(null);
                setProofModal(null);
                doSearch();
                apiFetch('/reports').then(setReports);
            };

            const deleteReport = async (id) => {
                if (!window.confirm('Are you sure you want to delete this unsolved report?')) return;
                await apiFetch('/reports/delete', 'POST', { id });
                apiFetch('/reports').then(setReports);
            };
            
            const drawProofCanvas = useCallback((canvas) => {
                if (!canvas || !proofModal || proofModal.context !== 'drawing') return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0, canvas.width, canvas.height);
                try {
                    const drawings = JSON.parse(proofModal.snapshot_data);
                    if (Array.isArray(drawings)) {
                        ctx.lineCap = 'round';
                        ctx.lineWidth = 5;
                        const scale = 400 / 500; 
                        ctx.scale(scale, scale);
                        
                        drawings.forEach(data => {
                            ctx.strokeStyle = data.color === 'black' ? '#000000' : (data.color || '#000000');
                            const lines = data.lines;
                            if (lines) {
                                for (let i = 0; i < lines.length; i += 4) {
                                    ctx.beginPath();
                                    ctx.moveTo(lines[i], lines[i+1]);
                                    ctx.lineTo(lines[i+2], lines[i+3]);
                                    ctx.stroke();
                                }
                            }
                        });
                        ctx.setTransform(1, 0, 0, 1, 0, 0); 
                    }
                } catch(e) { console.error('Canvas Draw Error', e); }
            }, [proofModal]);

            const filteredReports = reports.filter(r => {
                if (reportFilter === 'all') return true;
                const status = r.status || 'active';
                if (reportFilter === 'active') return status === 'active';
                if (reportFilter === 'ban') return status === 'ban';
                if (reportFilter === 'mute') return status === 'mute';
                return true;
            });

            return (
                <div className="p-3 p-md-4">
                    <h3 className="fw-bold mb-4">Trust & Safety</h3>
                    
                    <div className="card mb-4">
                        <div className="card-header text-primary"><i className="fas fa-search me-2"></i>User Lookup</div>
                        <div className="card-body">
                            <div className="input-group mb-3">
                                <input type="text" className="form-control" placeholder="Search Telegram ID or Name..." value={search} onChange={e=>setSearch(e.target.value)} onKeyPress={e=>e.key==='Enter' && doSearch()} />
                                <button className="btn btn-primary" onClick={doSearch}>Search</button>
                            </div>
                            
                            {users.length > 0 && (
                                <div className="table-responsive">
                                    <table className="table table-bordered align-middle text-center mb-0" style={{minWidth: '600px'}}>
                                        <thead className="table-light"><tr><th>ID / Name</th><th>Status</th><th>Sanctions</th></tr></thead>
                                        <tbody>
                                            {users.map(u => (
                                                <tr key={u.tg_id}>
                                                    <td>
                                                        <b className="font-monospace fw-bold text-primary cursor-pointer text-decoration-underline" onClick={() => fetchProfile(u.tg_id)}>{u.tg_id}</b>
                                                        <br/>{u.name || 'Unset'} <small className="text-muted">@{u.username}</small>
                                                    </td>
                                                    <td>
                                                        {u.status === 'active' ? <span className="badge bg-success">Active</span> : 
                                                         u.status === 'mute' ? <span className="badge bg-warning text-dark">Muted</span> : 
                                                         <span className="badge bg-danger">Banned</span>}<br/>
                                                        <span className="small text-muted d-block mt-1">{u.ban_until ? `Ban: ${u.ban_until.split('T')[0]}` : ''} {u.mute_until ? `Mute: ${u.mute_until.split('T')[0]}` : ''}</span>
                                                    </td>
                                                    <td>
                                                        <div className="btn-group btn-group-sm flex-wrap w-100 justify-content-center">
                                                            {u.status === 'ban' && (
                                                                <button className="btn btn-success" onClick={() => openActionModal(u.tg_id, 'unban', null, null)}>Unban</button>
                                                            )}
                                                            {u.status === 'mute' && (
                                                                <>
                                                                    <button className="btn btn-success" onClick={() => openActionModal(u.tg_id, 'unmute', null, null)}>Unmute</button>
                                                                    <button className="btn btn-outline-danger" onClick={() => openActionModal(u.tg_id, 'ban', 7, null)}>Ban 7d</button>
                                                                    <button className="btn btn-danger" onClick={() => openActionModal(u.tg_id, 'ban', 'perm', null)}>Permaban</button>
                                                                </>
                                                            )}
                                                            {u.status === 'active' && (
                                                                <>
                                                                    <button className="btn btn-outline-warning" onClick={() => openActionModal(u.tg_id, 'mute', 1, null)}>Mute 24h</button>
                                                                    <button className="btn btn-outline-danger" onClick={() => openActionModal(u.tg_id, 'ban', 7, null)}>Ban 7d</button>
                                                                    <button className="btn btn-danger" onClick={() => openActionModal(u.tg_id, 'ban', 'perm', null)}>Permaban</button>
                                                                </>
                                                            )}
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-header text-danger d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <span><i className="fas fa-flag me-2"></i>Player Reports</span>
                            <select className="form-select form-select-sm w-auto" value={reportFilter} onChange={e=>setReportFilter(e.target.value)}>
                                <option value="all">All Users</option>
                                <option value="active">Active Only</option>
                                <option value="ban">Banned Only</option>
                                <option value="mute">Muted Only</option>
                            </select>
                        </div>
                        <div className="table-responsive p-0 p-md-3">
                            <table className="table table-hover align-middle mb-0" style={{minWidth: '600px'}}>
                                <thead className="table-light"><tr><th className="ps-3">Date</th><th>Reporter</th><th>Reported ID</th><th>Details</th><th className="pe-3 text-end">Action</th></tr></thead>
                                <tbody>
                                    {filteredReports.map(r => (
                                        <tr key={r.id}>
                                            <td className="small ps-3">{new Date(r.created_at).toLocaleString()}</td>
                                            <td className="font-monospace small fw-bold text-primary text-decoration-underline cursor-pointer" onClick={() => fetchProfile(r.reporter_id)}>
                                                {r.reporter_id}
                                            </td>
                                            <td className="font-monospace small fw-bold text-danger text-decoration-underline cursor-pointer" onClick={() => fetchProfile(r.reported_id, r)}>
                                                {r.reported_id}
                                            </td>
                                            <td><span className="badge bg-info text-dark me-1">{r.context}</span></td>
                                            <td className="text-end pe-3">
                                                <div className="btn-group btn-group-sm">
                                                    <button className="btn btn-dark" onClick={() => { setProofModal(r); setReportModalTab('reason'); }}>Details</button>
                                                    <button className="btn btn-outline-danger" title="Delete Unsolved Report" onClick={() => deleteReport(r.id)}><i className="fas fa-trash"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredReports.length === 0 && <tr><td colSpan="5" className="text-center p-4 text-muted">No reports found matching criteria.</td></tr>}
                                </tbody>
                                
                            </table>
                        </div>
                    </div>

                    {selectedProfile && (
                        <div className="modal d-block" style={{background: 'rgba(0,0,0,0.6)', zIndex: 1050}}>
                            <div className="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                                <div className="modal-content border-0 shadow-lg rounded-4">
                                    <div className="modal-header bg-dark text-white p-3">
                                        <h5 className="modal-title fs-6">User Profile</h5>
                                        <button className="btn-close btn-close-white" onClick={()=>setSelectedProfile(null)}></button>
                                    </div>
                                    <div className="modal-body text-center bg-light p-4">
                                        {selectedProfile.avatar_url ? <img src={selectedProfile.avatar_url} className="rounded-circle mb-3 shadow" width="80" height="80" style={{objectFit:'cover'}} /> : <i className="fas fa-user-circle fs-1 mb-3 text-secondary"></i>}
                                        <h5 className="fw-bold mb-1">{selectedProfile.name || selectedProfile.reported_id || selectedProfile.tg_id}</h5>
                                        <p className="text-muted small mb-2">@{selectedProfile.username} • {selectedProfile.gender || 'Unset'}</p>
                                        <p className="mb-0">Status: <span className={`badge ${selectedProfile.status==='active'?'bg-success':(selectedProfile.status==='mute'?'bg-warning text-dark':'bg-danger')}`}>{selectedProfile.status}</span></p>
                                        {selectedProfile.ban_count > 0 && <p className="mb-0 mt-1 small text-danger fw-bold"><i className="fas fa-exclamation-triangle"></i> Banned {selectedProfile.ban_count} times</p>}
                                        
                                        <div className="d-flex flex-wrap gap-2 justify-content-center mt-4 pt-3 border-top">
                                            {selectedProfile.status === 'ban' && (
                                                <button className="btn btn-sm btn-success flex-fill" onClick={() => openActionModal(selectedProfile.tg_id, 'unban', null, selectedProfile.reportData)}>Unban</button>
                                            )}
                                            {selectedProfile.status === 'mute' && (
                                                <>
                                                    <button className="btn btn-sm btn-success flex-fill" onClick={() => openActionModal(selectedProfile.tg_id, 'unmute', null, selectedProfile.reportData)}>Unmute</button>
                                                    <button className="btn btn-sm btn-outline-danger flex-fill" onClick={() => openActionModal(selectedProfile.tg_id, 'ban', 7, selectedProfile.reportData)}>Ban 7d</button>
                                                    <button className="btn btn-sm btn-danger flex-fill" onClick={() => openActionModal(selectedProfile.tg_id, 'ban', 'perm', selectedProfile.reportData)}>Permaban</button>
                                                </>
                                            )}
                                            {selectedProfile.status === 'active' && (
                                                <>
                                                    <button className="btn btn-sm btn-outline-warning flex-fill" onClick={() => openActionModal(selectedProfile.tg_id, 'mute', 1, selectedProfile.reportData)}>Mute 24h</button>
                                                    <button className="btn btn-sm btn-outline-danger flex-fill" onClick={() => openActionModal(selectedProfile.tg_id, 'ban', 7, selectedProfile.reportData)}>Ban 7d</button>
                                                    <button className="btn btn-sm btn-danger flex-fill" onClick={() => openActionModal(selectedProfile.tg_id, 'ban', 'perm', selectedProfile.reportData)}>Permaban</button>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {proofModal && (
                        <div className="modal d-block" style={{background: 'rgba(0,0,0,0.6)', zIndex: 1050}}>
                            <div className="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
                                <div className="modal-content border-0 shadow-lg rounded-4">
                                    <div className="modal-header bg-dark text-white p-3">
                                        <h5 className="modal-title fs-6">Report Details</h5>
                                        <button className="btn-close btn-close-white" onClick={()=>setProofModal(null)}></button>
                                    </div>
                                    <div className="modal-body bg-light">
                                        <ul className="nav nav-tabs mb-3 border-bottom-0 flex-nowrap overflow-auto">
                                            <li className="nav-item cursor-pointer flex-fill text-center">
                                                <a className={`nav-link text-dark ${reportModalTab === 'reason' ? 'active fw-bold border-bottom-0 shadow-sm' : ''}`} onClick={() => setReportModalTab('reason')}>Reason</a>
                                            </li>
                                            <li className="nav-item cursor-pointer flex-fill text-center">
                                                <a className={`nav-link text-dark ${reportModalTab === 'proof' ? 'active fw-bold border-bottom-0 shadow-sm' : ''}`} onClick={() => setReportModalTab('proof')}>Evidence</a>
                                            </li>
                                        </ul>
                                        {reportModalTab === 'reason' && (
                                            <div className="bg-white p-3 border rounded shadow-sm">
                                                <h6 className="fw-bold">Context: <span className="badge bg-info text-dark fw-normal">{proofModal.context}</span></h6>
                                                <hr className="my-2"/>
                                                <p className="mb-0">{proofModal.reason}</p>
                                            </div>
                                        )}
                                        {reportModalTab === 'proof' && (
                                            proofModal.context === 'drawing' ? (
                                                <div className="bg-white p-3 border rounded shadow-sm d-flex justify-content-center">
                                                    <canvas ref={drawProofCanvas} width="400" height="400" style={{border: '2px solid #cbd5e1', borderRadius: '12px', maxWidth: '100%', height: 'auto', display: 'block', margin: '0 auto', background: '#fff', backgroundImage: 'radial-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '16px 16px'}}></canvas>
                                                </div>
                                            ) : (
                                                <pre className="bg-white p-3 border rounded shadow-sm" style={{maxHeight: '400px', overflow: 'auto', whiteSpace: 'pre-wrap', fontSize: '0.8rem'}}>{proofModal.snapshot_data}</pre>
                                            )
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {actionModal && (
                        <div className="modal d-block" style={{background: 'rgba(0,0,0,0.6)', zIndex: 1060}}>
                            <div className="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                                <div className="modal-content border-0 shadow-lg rounded-4">
                                    <div className="modal-header bg-dark text-white p-3">
                                        <h5 className="modal-title fs-6">Confirm Action: {actionModal.action.toUpperCase()}</h5>
                                        <button className="btn-close btn-close-white" onClick={() => setActionModal(null)}></button>
                                    </div>
                                    <div className="modal-body p-3 p-md-4 text-start">
                                        <label className="form-label small fw-bold">Message to User (Bot will notify them):</label>
                                        <textarea className="form-control mb-3" rows="3" value={actionModal.message} onChange={(e) => setActionModal({...actionModal, message: e.target.value})}></textarea>
                                        <div className="alert alert-info py-2 small fw-bold"><i className="fas fa-info-circle me-1"></i> A 'contact admin for mistakes' note will be automatically appended to this message.</div>
                                        
                                        <div className="d-flex gap-2 mt-4">
                                            <button className="btn btn-secondary w-50 fw-bold" onClick={() => setActionModal(null)}>Cancel</button>
                                            <button className="btn btn-primary w-50 fw-bold" onClick={() => takeAction(actionModal)}>Execute</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Economy = ({ apiFetch }) => {
            const [targetUser, setTargetUser] = useState('');
            const [credits, setCredits] = useState(0);
            const [gems, setGems] = useState(0);
            const [htmlMessage, setHtmlMessage] = useState(''); 
            
            const [gemPackages, setGemPackages] = useState([]);
            const [starPackages, setStarPackages] = useState([]);
            const [inkConfig, setInkConfig] = useState({ free: 2500, extra: 2500, cost: 0.5, max_buys: 1 });
            const [unbanCost, setUnbanCost] = useState(50);
            const [unmuteCost, setUnmuteCost] = useState(25);
            
            const [showStarPkgs, setShowStarPkgs] = useState(false);
            const [showGemPkgs, setShowGemPkgs] = useState(false);
            const [showInkCfg, setShowInkCfg] = useState(false);

            const loadSettings = () => {
                apiFetch('/config').then(c => {
                    setGemPackages(c.gemPackages || []);
                    setStarPackages(c.starPackages || []);
                    if (c.inkConfig) setInkConfig(c.inkConfig);
                    if (c.unbanCost) setUnbanCost(c.unbanCost);
                    if (c.unmuteCost) setUnmuteCost(c.unmuteCost);
                });
            };
            useEffect(() => { loadSettings(); }, []);

            const applyFunds = async () => {
                if(!targetUser) return;
                await apiFetch('/economy/modify', 'POST', { tgId: targetUser, credits: Number(credits), gems: Number(gems), message: htmlMessage });
                alert('Funds successfully applied!');
                setCredits(0); setGems(0); setHtmlMessage(''); setTargetUser('');
            };

            const addGemPackage = () => {
                const maxId = gemPackages.length > 0 ? Math.max(...gemPackages.map(p => p.id)) : 0;
                setGemPackages([...gemPackages, { id: maxId + 1, gems: 1, credits: 5 }]);
            };
            const updateGemPackage = (id, field, value) => {
                setGemPackages(gemPackages.map(p => p.id === id ? { ...p, [field]: Number(value) } : p));
            };
            const removeGemPackage = (id) => setGemPackages(gemPackages.filter(p => p.id !== id));

            const addStarPackage = () => {
                const maxId = starPackages.length > 0 ? Math.max(...starPackages.map(p => p.id)) : 0;
                setStarPackages([...starPackages, { id: maxId + 1, stars: 20, gems: 20 }]);
            };
            const updateStarPackage = (id, field, value) => {
                setStarPackages(starPackages.map(p => p.id === id ? { ...p, [field]: Number(value) } : p));
            };
            const removeStarPackage = (id) => setStarPackages(starPackages.filter(p => p.id !== id));

            const saveEconomy = async () => {
                await apiFetch('/config/economy', 'POST', { gemPackages, starPackages, inkConfig, unbanCost, unmuteCost });
                alert('Economy Configuration Saved. Modifications reflected globally.');
            };

            return (
                <div className="p-3 p-md-4">
                    <h3 className="fw-bold mb-4">Economy & Monetization</h3>
                    <div className="row g-3 g-md-4 mb-4">
                        <div className="col-12 col-md-6">
                            <div className="card h-100 border-0 shadow-sm">
                                <div className="card-header bg-white text-success fw-bold"><i className="fas fa-hand-holding-usd me-2"></i>Manual Currency Grant</div>
                                <div className="card-body bg-light d-flex flex-column gap-3">
                                    <div><label className="form-label small fw-bold">Target Telegram ID</label><input className="form-control" placeholder="12345678" value={targetUser} onChange={e=>setTargetUser(e.target.value)} /></div>
                                    <div className="row g-2">
                                        <div className="col-6"><label className="form-label small fw-bold text-warning">Credits (+/-)</label><input className="form-control" type="number" value={credits} onChange={e=>setCredits(e.target.value)} /></div>
                                        <div className="col-6"><label className="form-label small fw-bold text-info">Gems (+/-)</label><input className="form-control" type="number" value={gems} onChange={e=>setGems(e.target.value)} /></div>
                                    </div>
                                    <div className="mb-2">
                                        <label className="form-label small fw-bold text-secondary">HTML Message (Optional)</label>
                                        <textarea className="form-control form-control-sm" placeholder="<b>Congratulations!</b> You've been granted <i>extra</i> currency." rows="2" value={htmlMessage} onChange={e => setHtmlMessage(e.target.value)}></textarea>
                                        <div className="form-text text-muted" style={{fontSize: '0.75rem'}}>Supports HTML: &lt;b&gt;, &lt;i&gt;, &lt;u&gt;, &lt;s&gt;, &lt;a href="..."&gt;, &lt;code&gt;</div>
                                    </div>
                                    <button className="btn btn-success mt-auto w-100 fw-bold" onClick={applyFunds} disabled={!targetUser}>Execute Transaction</button>
                                </div>
                            </div>
                        </div>
                        <div className="col-12 col-md-6">
                            <div className="card h-100 border-0 shadow-sm">
                                <div className="card-header bg-white text-primary fw-bold"><i className="fas fa-chart-line me-2"></i>Global Penalty Costs</div>
                                <div className="card-body bg-light d-flex flex-column justify-content-center">
                                    <div className="row g-3 mb-3">
                                        <div className="col-6">
                                            <label className="form-label small fw-bold">Unban Cost (⭐️)</label>
                                            <input type="number" className="form-control" value={unbanCost} onChange={e => setUnbanCost(Number(e.target.value))} />
                                        </div>
                                        <div className="col-6">
                                            <label className="form-label small fw-bold">Unmute Cost (⭐️)</label>
                                            <input type="number" className="form-control" value={unmuteCost} onChange={e => setUnmuteCost(Number(e.target.value))} />
                                        </div>
                                    </div>
                                    <div className="alert alert-primary py-2 small mb-0 mt-auto"><i className="fas fa-info-circle me-1"></i> These prices dictate how many Telegram Stars a user pays to self-remove automated restrictions.</div>
                                </div>
                            </div>
                        </div>
                        
                        <div className="col-12 col-md-6">
                            <div className="card h-100 border-0 shadow-sm">
                                <div className="card-header bg-white text-dark fw-bold d-flex justify-content-between align-items-center" style={{cursor: 'pointer'}} onClick={() => setShowInkCfg(!showInkCfg)}>
                                    <span><i className="fas fa-tint me-2 text-dark"></i>Ink Configuration</span>
                                    <i className={`fas fa-chevron-${showInkCfg ? 'up' : 'down'} text-muted`}></i>
                                </div>
                                {showInkCfg && (
                                    <div className="card-body bg-light border-top">
                                        <div className="row g-2 mb-2">
                                            <div className="col-6">
                                                <label className="small fw-bold text-muted">Free Ink Level</label>
                                                <input type="number" className="form-control form-control-sm" value={inkConfig.free} onChange={e => setInkConfig({...inkConfig, free: Number(e.target.value)})} />
                                            </div>
                                            <div className="col-6">
                                                <label className="small fw-bold text-muted">Extra Ink Level</label>
                                                <input type="number" className="form-control form-control-sm" value={inkConfig.extra} onChange={e => setInkConfig({...inkConfig, extra: Number(e.target.value)})} />
                                            </div>
                                            <div className="col-6">
                                                <label className="small fw-bold text-muted">Cost (Credits)</label>
                                                <input type="number" step="0.1" className="form-control form-control-sm" value={inkConfig.cost} onChange={e => setInkConfig({...inkConfig, cost: Number(e.target.value)})} />
                                            </div>
                                            <div className="col-6">
                                                <label className="small fw-bold text-muted">Max Buys</label>
                                                <input type="number" className="form-control form-control-sm" value={inkConfig.max_buys} onChange={e => setInkConfig({...inkConfig, max_buys: Number(e.target.value)})} />
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="col-12 col-md-6">
                            <div className="card h-100 border-0 shadow-sm">
                                <div className="card-header bg-white text-info fw-bold d-flex justify-content-between align-items-center" style={{cursor: 'pointer'}} onClick={() => setShowStarPkgs(!showStarPkgs)}>
                                    <span><i className="fas fa-star me-2"></i>Star Purchase Packages</span>
                                    <i className={`fas fa-chevron-${showStarPkgs ? 'up' : 'down'} text-muted`}></i>
                                </div>
                                {showStarPkgs && (
                                    <div className="card-body bg-light border-top">
                                        <div className="alert alert-info small py-2 mb-3">Configure packages users buy with Telegram Stars to get Gems.</div>
                                        
                                        {starPackages.map(pkg => (
                                            <div key={pkg.id} className="d-flex gap-2 mb-2 align-items-center">
                                                <input type="number" className="form-control form-control-sm text-center fw-bold w-25" value={pkg.stars} onChange={e => updateStarPackage(pkg.id, 'stars', e.target.value)} /> 
                                                <span className="small fw-bold text-muted text-nowrap">Stars =</span>
                                                <input type="number" className="form-control form-control-sm text-center fw-bold w-25" value={pkg.gems} onChange={e => updateStarPackage(pkg.id, 'gems', e.target.value)} /> 
                                                <span className="small fw-bold text-muted">Gems</span>
                                                <button className="btn btn-sm btn-danger shadow-sm ms-auto" onClick={() => removeStarPackage(pkg.id)}><i className="fas fa-times"></i></button>
                                            </div>
                                        ))}
                                        <button className="btn btn-sm btn-outline-info mt-2 w-100 fw-bold border-dashed" onClick={addStarPackage}>+ Add New Star Package</button>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="col-12 col-md-6">
                            <div className="card h-100 border-0 shadow-sm">
                                <div className="card-header bg-white text-warning fw-bold d-flex justify-content-between align-items-center" style={{cursor: 'pointer'}} onClick={() => setShowGemPkgs(!showGemPkgs)}>
                                    <span><i className="fas fa-exchange-alt me-2 text-warning"></i>Gem Exchange Packages</span>
                                    <i className={`fas fa-chevron-${showGemPkgs ? 'up' : 'down'} text-muted`}></i>
                                </div>
                                {showGemPkgs && (
                                    <div className="card-body bg-light border-top">
                                        <div className="alert alert-warning small py-2 mb-3 text-dark">Configure packages users can buy credits with using gems.</div>
                                        
                                        {gemPackages.map(pkg => (
                                            <div key={pkg.id} className="d-flex gap-2 mb-2 align-items-center">
                                                <input type="number" className="form-control form-control-sm text-center fw-bold w-25" value={pkg.gems} onChange={e => updateGemPackage(pkg.id, 'gems', e.target.value)} /> 
                                                <span className="small fw-bold text-muted text-nowrap">Gems =</span>
                                                <input type="number" className="form-control form-control-sm text-center fw-bold w-25" value={pkg.credits} onChange={e => updateGemPackage(pkg.id, 'credits', e.target.value)} /> 
                                                <span className="small fw-bold text-muted">Credits</span>
                                                <button className="btn btn-sm btn-danger shadow-sm ms-auto" onClick={() => removeGemPackage(pkg.id)}><i className="fas fa-times"></i></button>
                                            </div>
                                        ))}
                                        <button className="btn btn-sm btn-outline-warning mt-2 w-100 fw-bold border-dashed text-dark" onClick={addGemPackage}>+ Add New Exchange Package</button>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="col-12">
                            <button className="btn btn-primary w-100 fw-bold shadow-sm p-3 mt-2 mb-4" onClick={saveEconomy}><i className="fas fa-save me-2"></i> Save Economy Configuration Globally</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ServerControl = ({ apiFetch }) => {
            const [maint, setMaint] = useState(false);
            const [maintDuration, setMaintDuration] = useState(1);
            const [dict, setDict] = useState('');
            const [msg, setMsg] = useState('');
            const [rooms, setRooms] = useState([]);
            const [maxRooms, setMaxRooms] = useState(1250);
            const [roomLimits, setRoomLimits] = useState({ publicMax: 8, privateMax: 10, privateFree: 4, privateExtraCost: 1 });

            const load = () => {
                apiFetch('/config').then(c => { 
                    setMaint(c.maintenance); 
                    setDict(c.dictionary.join(', ')); 
                    if(c.maxRooms) setMaxRooms(c.maxRooms);
                    if(c.roomLimits) setRoomLimits(c.roomLimits);
                });
                apiFetch('/rooms').then(setRooms);
            };
            useEffect(() => { load(); }, []);

            const actionRoom = async (roomId, action) => {
                if(!window.confirm(`${action.toUpperCase()} Room ${roomId}?`)) return;
                await apiFetch('/rooms/action', 'POST', { roomId, action });
                load();
            };

            return (
                <div className="p-3 p-md-4">
                    <h3 className="fw-bold mb-4">Server Architecture & Intervention</h3>
                    
                    <div className="row g-3 mb-4">
                        <div className="col-12 col-md-6">
                            <div className={`card h-100 border-2 ${maint ? 'border-danger' : 'border-success'}`}>
                                <div className="card-body text-center p-4 p-md-5 d-flex flex-column justify-content-center">
                                    <i className={`fas ${maint ? 'fa-tools text-danger' : 'fa-server text-success'} fs-1 mb-3`}></i>
                                    <h4>{maint ? 'Maintenance is ACTIVE' : 'Server is LIVE'}</h4>
                                    <p className="text-muted small mb-3">When active, users see a countdown modal and cannot play.</p>
                                    
                                    {!maint && (
                                        <div className="mb-3 w-75 mx-auto">
                                            <label className="form-label small fw-bold">Duration (Hours)</label>
                                            <input type="number" step="0.5" className="form-control text-center" value={maintDuration} onChange={e=>setMaintDuration(e.target.value)} />
                                        </div>
                                    )}

                                    <button className={`btn rounded-pill px-4 fw-bold mt-auto ${maint ? 'btn-danger' : 'btn-success'}`} onClick={async () => { await apiFetch('/config/maintenance', 'POST', { maintenance: !maint, duration_hours: maintDuration }); load(); }}>
                                        {maint ? 'Disable Maintenance' : 'Activate Maintenance Mode'}
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="col-12 col-md-6">
                            <div className="card h-100">
                                <div className="card-header bg-dark text-white"><i className="fas fa-sliders-h me-2"></i>Limits & Announcements</div>
                                <div className="card-body d-flex flex-column">
                                    <div className="mb-3 border-bottom pb-3">
                                        <label className="form-label small fw-bold">Max Active Rooms Capacity</label>
                                        <div className="d-flex gap-2 flex-wrap flex-md-nowrap">
                                            <input type="number" className="form-control" value={maxRooms} onChange={e=>setMaxRooms(e.target.value)} />
                                            <button className="btn btn-primary fw-bold" onClick={async () => { await apiFetch('/config/server_limits', 'POST', { maxRooms, roomLimits }); alert('Server capacity updated!'); }}>Save</button>
                                        </div>
                                        <small className="text-muted" style={{fontSize: '0.75rem'}}>Prevents new rooms if this limit is reached to save server resources.</small>
                                    </div>
                                    <div className="mt-auto">
                                        <label className="form-label small fw-bold">Global PA System</label>
                                        <textarea className="form-control mb-2" placeholder="Attention all players..." value={msg} onChange={e=>setMsg(e.target.value)} rows="2"></textarea>
                                        <button className="btn btn-dark w-100 fw-bold" onClick={async () => { await apiFetch('/broadcast', 'POST', { message: msg }); setMsg(''); alert('Broadcast deployed!'); }} disabled={!msg}>Send Red Alert</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="card mb-4">
                        <div className="card-header bg-dark text-white"><i className="fas fa-users-cog me-2"></i>Room Configurations (Users & Cost)</div>
                        <div className="card-body">
                            <div className="row g-2 mb-3">
                                <div className="col-6 col-md-3">
                                    <label className="form-label small fw-bold text-nowrap">Public Max Users</label>
                                    <input type="number" className="form-control form-control-sm" value={roomLimits.publicMax} onChange={e=>setRoomLimits({...roomLimits, publicMax: parseInt(e.target.value)})} />
                                    <small className="text-muted" style={{fontSize: '0.7rem'}}>Fixed size</small>
                                </div>
                                <div className="col-6 col-md-3">
                                    <label className="form-label small fw-bold text-nowrap">Private Max Users</label>
                                    <input type="number" className="form-control form-control-sm" value={roomLimits.privateMax} onChange={e=>setRoomLimits({...roomLimits, privateMax: parseInt(e.target.value)})} />
                                    <small className="text-muted" style={{fontSize: '0.7rem'}}>Allowed limit</small>
                                </div>
                                <div className="col-6 col-md-3">
                                    <label className="form-label small fw-bold text-nowrap">Private Free Users</label>
                                    <input type="number" className="form-control form-control-sm" value={roomLimits.privateFree} onChange={e=>setRoomLimits({...roomLimits, privateFree: parseInt(e.target.value)})} />
                                    <small className="text-muted" style={{fontSize: '0.7rem'}}>Zero cost up to</small>
                                </div>
                                <div className="col-6 col-md-3">
                                    <label className="form-label small fw-bold text-nowrap">Private Extra Cost</label>
                                    <input type="number" className="form-control form-control-sm" value={roomLimits.privateExtraCost} onChange={e=>setRoomLimits({...roomLimits, privateExtraCost: parseInt(e.target.value)})} />
                                    <small className="text-muted" style={{fontSize: '0.7rem'}}>Cred per user</small>
                                </div>
                            </div>
                            <button className="btn btn-primary btn-sm fw-bold w-100 py-2" onClick={async () => { await apiFetch('/config/server_limits', 'POST', { maxRooms, roomLimits }); alert('Room configurations saved!'); }}>Save Room Configuration</button>
                        </div>
                    </div>

                    <div className="card mb-4">
                        <div className="card-header text-info"><i className="fas fa-book me-2"></i>Word Dictionary Manager</div>
                        <div className="card-body">
                            <p className="small text-muted">Comma-separated list of words used for prompts.</p>
                            <textarea className="form-control mb-3" rows="4" value={dict} onChange={e=>setDict(e.target.value)}></textarea>
                            <button className="btn btn-info text-white fw-bold w-100 py-2" onClick={async () => { 
                                const arr = dict.split(',').map(w => w.trim().toLowerCase()).filter(w => w.length >= 3);
                                await apiFetch('/dictionary/update', 'POST', { words: arr });
                                alert('Dictionary Saved!'); 
                            }}>Sync Dictionary to Redis</button>
                        </div>
                    </div>

                    <div className="card mb-4">
                        <div className="card-header text-danger"><i className="fas fa-hammer me-2"></i>Active Room Intervention</div>
                        <div className="table-responsive p-0 p-md-3">
                            <table className="table table-hover align-middle text-center mb-0" style={{minWidth: '500px'}}>
                                <thead className="table-light"><tr><th className="ps-3">Room ID</th><th>Visibility</th><th>Players</th><th>Phase</th><th className="pe-3">Emergency Actions</th></tr></thead>
                                <tbody>
                                    {rooms.map(r => (
                                        <tr key={r.id}>
                                            <td className="fw-bold ps-3">{r.id}</td>
                                            <td>{r.is_private ? <span className="badge bg-danger">Private</span> : <span className="badge bg-success">Public</span>}</td>
                                            <td>{r.members}</td>
                                            <td>{r.status}</td>
                                            <td className="pe-3">
                                                <button className="btn btn-sm btn-outline-warning me-2" onClick={()=>actionRoom(r.id, 'wipe_chat')}><i className="fas fa-eraser"></i></button>
                                                <button className="btn btn-sm btn-danger" onClick={()=>actionRoom(r.id, 'close')}><i className="fas fa-skull"></i> <span className="d-none d-md-inline ms-1">Close</span></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {rooms.length === 0 && <tr><td colSpan="5" className="text-muted p-4">No active rooms found.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminApp = () => {
            const [initData, setInitData] = useState('');
            const [error, setError] = useState('');
            const [tab, setTab] = useState('dashboard');
            const [isVerified, setIsVerified] = useState(false);

            useEffect(() => {
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
                    window.Telegram.WebApp.expand();
                    setInitData(window.Telegram.WebApp.initData);
                } else {
                    setInitData("mock_web_auth=true&user=%7B%22id%22%3A123456789%7D");
                }
            }, []);

            useEffect(() => {
                if (initData) {
                    fetch('/api/admin/verify', {
                        headers: { 'Content-Type': 'application/json', 'X-Init-Data': initData }
                    })
                    .then(res => {
                        if (res.status === 403 || res.status === 401) {
                            setError('Access Denied: You are not authorized as an Admin.');
                            if (window.Telegram && window.Telegram.WebApp) {
                                setTimeout(() => window.Telegram.WebApp.close(), 3000);
                            }
                        } else {
                            setIsVerified(true);
                        }
                    })
                    .catch(err => {
                        setError('Connection error verifying admin status.');
                    });
                }
            }, [initData]);

            const apiFetch = async (path, method = 'GET', body = null) => {
                const options = { method, headers: { 'Content-Type': 'application/json', 'X-Init-Data': initData } };
                if (body) options.body = JSON.stringify(body);
                const res = await fetch(`/api/admin${path}`, options);
                
                if (res.status === 403 || res.status === 401) { 
                    setError('Access Denied: You are not authorized.'); 
                    if (window.Telegram && window.Telegram.WebApp) {
                        setTimeout(() => window.Telegram.WebApp.close(), 3000);
                    }
                    throw new Error('Auth'); 
                }
                return res.json();
            };

            if (error) return <div className="container mt-5"><div className="alert alert-danger shadow-lg p-4 p-md-5 text-center"><i className="fas fa-shield-alt fs-1 mb-3"></i><h4>{error}</h4><p className="mb-0">Please access this panel through the official Telegram Bot. Closing...</p></div></div>;
            if (!isVerified) return <div className="d-flex justify-content-center align-items-center vh-100"><div className="spinner-border text-primary"></div></div>;

            return (
                <div className="d-flex app-container w-100">
                    <div className="sidebar">
                        <div className="sidebar-header text-center mt-2">
                            <i className="fas fa-cogs fs-2 text-primary mb-2"></i>
                            <h5 className="fw-bold text-white m-0">Admin Center</h5>
                        </div>
                        <div className={`nav-item ${tab === 'dashboard' ? 'active' : ''}`} onClick={() => setTab('dashboard')}><i className="fas fa-chart-pie"></i> <span className="d-block d-md-inline">Dashboard</span></div>
                        <div className={`nav-item ${tab === 'moderation' ? 'active' : ''}`} onClick={() => setTab('moderation')}><i className="fas fa-shield-alt"></i> <span className="d-block d-md-inline">Moderation</span></div>
                        <div className={`nav-item ${tab === 'economy' ? 'active' : ''}`} onClick={() => setTab('economy')}><i className="fas fa-coins"></i> <span className="d-block d-md-inline">Economy</span></div>
                        <div className={`nav-item ${tab === 'styles' ? 'active' : ''}`} onClick={() => setTab('styles')}><i className="fas fa-font"></i> <span className="d-block d-md-inline">Styles</span></div>
                        <div className={`nav-item ${tab === 'server' ? 'active' : ''}`} onClick={() => setTab('server')}><i className="fas fa-server"></i> <span className="d-block d-md-inline">Settings</span></div>
                        
                        <div className="sidebar-footer text-center opacity-50 small mt-auto">
                            DoodleDash OS v1.0
                        </div>
                    </div>
                    <div className="main-content">
                        {tab === 'dashboard' && <Dashboard apiFetch={apiFetch} />}
                        {tab === 'moderation' && <Moderation apiFetch={apiFetch} />}
                        {tab === 'economy' && <Economy apiFetch={apiFetch} />}
                        {tab === 'styles' && <StylesManager apiFetch={apiFetch} />}
                        {tab === 'server' && <ServerControl apiFetch={apiFetch} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
