                                <button className="btn btn-light text-success fw-bold rounded-pill btn-sm w-100 mt-2" disabled={!user.daily_available} onClick={() => socket.emit('claim_reward', {type: 'daily'})}>
                                    {user.daily_available ? 'Claim Now' : 'Claimed Today'}
                                </button>
                            </div>
                        </div>
                        <div className="col-md-6 mb-3">
                            <div className="hero-section h-100" style={{background: 'linear-gradient(135deg, #f59e0b 0%, #f43f5e 100%)'}}>
                                <h5><i className="fas fa-tv"></i> Ad Bonuses</h5>
                                <p className="small mb-2">Watch ads to earn Credits! (Bonus credits on final views)</p>
                                <div className="d-flex flex-column gap-2 mt-2">
                                    {renderAdBtn(1)}
                                    {renderAdBtn(2)}
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="d-flex justify-content-between align-items-center mb-3">
                        <h3 className="fw-bold m-0">Game Lobbies</h3>
                        <button className="btn btn-primary shadow-sm rounded-pill px-4" onClick={() => setModal({ type: 'create_room', title: 'Create Room' })}>
                            <i className="fas fa-plus"></i> Create
                        </button>
                    </div>

                    <div className="lobby-tabs-wrapper">
                        <div className={`lobby-tab ${activeTab === 'public' ? 'active' : ''}`} onClick={() => setActiveTab('public')}>
                            <i className="fas fa-globe me-2"></i>Public
                        </div>
                        <div className={`lobby-tab ${activeTab === 'private' ? 'active' : ''}`} onClick={() => setActiveTab('private')}>
                            <i className="fas fa-lock me-2"></i>Private
                        </div>
                        <div className={`lobby-tab ${activeTab === 'my_rooms' ? 'active' : ''}`} onClick={() => setActiveTab('my_rooms')}>
                            <i className="fas fa-user me-2"></i>My Rooms
                        </div>
                    </div>

                    <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd} className="swipe-container" style={{ minHeight: '300px' }}>
                        <div className="input-group mb-4 shadow-sm rounded-pill overflow-hidden border bg-white">
                            <input type="text" className="form-control border-0 px-4 py-2" placeholder={`Search ${activeTab.replace('_', ' ')} Room...`} value={searchId} onChange={e => setSearchId(e.target.value)} />
                        </div>

                        <div className="row g-3">
                            {filteredRooms.length > 0 ? filteredRooms.map(r => {
                                const isFull = r.member_count >= r.max_members;
                                const isFree = r.id === 1 || r.id === 2;
                                return (
                                    <div key={r.id} className="col-md-4 col-sm-6 mb-2">
                                        <div className="room-card bg-white rounded-4 p-3 border shadow-sm h-100 position-relative overflow-hidden hover-up">
                                            <div className={`position-absolute top-0 start-0 w-100`} style={{height: '4px', background: r.is_private ? '#f43f5e' : (isFree ? '#10b981' : '#6366f1')}}></div>
                                            
                                            <div className="d-flex justify-content-between align-items-center mb-2 mt-1">
                                                <h5 className="fw-bold m-0 text-dark d-flex align-items-center">
                                                    <i className={`fas fa-${r.is_private ? 'lock text-danger' : 'globe text-primary'} me-2 fs-5`}></i>
                                                    Room {r.id}
                                                </h5>
                                                {isFull ? (
                                                    <span className="badge bg-secondary rounded-pill">Full</span>
                                                ) : (
                                                    <span className={`badge ${isFree ? 'bg-success' : (r.is_private ? 'bg-danger' : 'bg-primary')} rounded-pill px-2 py-1`}>
                                                        {isFree ? <><i className="fas fa-gift"></i> Free</> : (r.is_private ? <><i className="fas fa-key"></i> Password</> : <><i className="fas fa-coins"></i> -1 Credit</>)}
                                                    </span>
                                                )}
                                            </div>
                                            
                                            {activeTab === 'my_rooms' && r.password && (
                                                <div className="mt-3 text-center">
                                                    <span className="badge bg-light text-dark border p-2 cursor-pointer shadow-sm w-100" onClick={() => copyPassword(r.password)}>
                                                        <i className="fas fa-copy text-primary me-1"></i> Pass: {r.password}
                                                    </span>
                                                </div>
                                            )}
                                            
                                            <div className="d-flex align-items-center justify-content-between mt-3">
                                                <div className="text-muted small fw-bold bg-light px-2 py-1 rounded">
                                                    <i className="fas fa-users text-secondary"></i> {r.member_count} / {r.max_members}
                                                </div>
                                                <button className={`btn btn-sm ${isFull ? 'btn-light text-muted' : (isFree ? 'btn-success' : 'btn-primary')} rounded-pill px-4 fw-bold shadow-sm`} 
                                                    disabled={isFull}
                                                    onClick={() => {
                                                        if (r.is_private && activeTab !== 'my_rooms') {
                                                            setModal({ type: 'prompt_pwd', title: 'Join Private Room', room_id: r.id });
                                                        } else if (r.is_private && activeTab === 'my_rooms') {
                                                            socket.emit('join_room', { room_id: r.id, password: r.password });
                                                        } else if (isFree) {
                                                            socket.emit('join_room', { room_id: r.id });
                                                        } else {
                                                            setModal({ type: 'confirm_join', title: 'Join Public Room', content: 'Cost: 1 Credit', room_id: r.id });
                                                        }
                                                    }}>
                                                    {isFull ? 'Full' : 'Join'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            }) : (
                                <div className="col-12 text-center py-5 text-muted">
                                    <i className={`fas fa-${activeTab === 'public' ? 'globe' : (activeTab === 'private' ? 'lock' : 'user')} fs-1 mb-3 text-light`}></i>
                                    <h5>No {activeTab.replace('_', ' ')} rooms found</h5>
                                    <p className="small">Be the first to create one!</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {adState.show && (
                        <div className="wb-overlay" style={{zIndex: 9999, background: 'rgba(0,0,0,0.92)', position: 'fixed'}}>
                            <h2 className="text-white mb-4 fw-bold">Loading Advertisement</h2>
                            <div className="spinner-border text-primary mb-4" style={{width: '4rem', height: '4rem', borderWidth: '0.4em'}}></div>
                            <p className="text-muted mt-5 small">Please wait, do not close.</p>
                        </div>
                    )}
                </div>
            );
        };

        const GameRoom = ({ roomData, tgId, onCall, socket, setProfileModal, activeCall, isMicMuted, setIsMicMuted, isSpeakerMuted, setIsSpeakerMuted, setModal }) => {
            const { room, members, activeCalls } = roomData;
            const myCall = activeCalls.find(c => c.caller === tgId || c.receiver === tgId);

            return (
                <div className="row">
                    <div className="col-12 col-lg-8 mx-auto">
                        <div className="whiteboard-wrapper">
                            
                            {(roomData.room.status === 'DRAWING' && roomData.masked_word) ? (
                            <div className="w-100 d-flex flex-wrap justify-content-center gap-2 mb-3 bg-light p-2 rounded-pill shadow-sm">
                                {roomData.masked_word.map((item, i) => (
                                    <div 
                                        key={i}
                                        className={`d-flex align-items-center justify-content-center rounded shadow-sm fw-bold fs-5 ${item.revealed ? 'bg-success text-white hint-reveal' : 'bg-secondary text-white cursor-pointer'}`}
                                        style={{ width: '35px', height: '35px', transition: '0.2s' }}
                                        onClick={() => {
                                            if (!item.revealed && roomData.room.current_drawer_id !== tgId) {
                                                setModal({ type: 'confirm_buy_hint', index: item.index });
                                            }
                                        }}
                                        title={!item.revealed && roomData.room.current_drawer_id !== tgId ? "Click to reveal (1 Credit)" : ""}
                                    >
                                        {item.revealed ? item.char : '?'}
                                    </div>
                                ))}
                            </div>
                        ) : null}

                        <Whiteboard roomData={roomData} tgId={tgId} socket={socket} setModal={setModal} />
                        
                        {(activeCall && activeCall.status === 'ACTIVE') ? (
                            <div className="mt-3 w-100 p-3 bg-dark text-white rounded-4 shadow-sm d-flex flex-column align-items-center gap-3">
                                    <div className="d-flex align-items-center justify-content-center w-100 px-2">
                                        <div className="d-flex align-items-center gap-2">
                                            <i className="fas fa-phone-volume heartbeat text-success"></i>
                                            <span className="fw-bold fs-5">In Call: {toHex(activeCall.caller === tgId ? activeCall.receiver : activeCall.caller)}</span>
                                        </div>
                                    </div>
                                    
                                    <div className="d-flex align-items-center gap-4 justify-content-center w-100 pb-2">
                                        <button className={`btn ${isMicMuted ? 'btn-danger' : 'btn-light'} rounded-circle shadow d-flex align-items-center justify-content-center`} style={{width: '50px', height: '50px'}} onClick={() => setIsMicMuted(!isMicMuted)} title="Mute Mic">
                                            <i className={`fas ${isMicMuted ? 'fa-microphone-slash' : 'fa-microphone'} fs-5`}></i>
                                        </button>
                                        <button className={`btn ${isSpeakerMuted ? 'btn-danger' : 'btn-light'} rounded-circle shadow d-flex align-items-center justify-content-center`} style={{width: '50px', height: '50px'}} onClick={() => setIsSpeakerMuted(!isSpeakerMuted)} title="Mute Speaker">
                                            <i className={`fas ${isSpeakerMuted ? 'fa-volume-mute' : 'fa-volume-up'} fs-5`}></i>
                                        </button>
                                        <button className="btn btn-danger rounded-circle shadow d-flex align-items-center justify-content-center" style={{width: '50px', height: '50px'}} onClick={() => socket.emit('end_call', {call_id: activeCall.id})} title="End Call">
                                            <i className="fas fa-phone-slash fs-5"></i>
                                        </button>
                                    </div>
                                </div>
                            ) : null}

                            <div className="mt-4 w-100">
                                <h6 className="fw-bold text-secondary mb-3">Player List</h6>
                                {members.map(m => {
                                    const mCall = activeCalls.find(c => c.caller === m.user_id || c.receiver === m.user_id);
                                    
                                    return (
                                        <div key={m.user_id} className="d-flex align-items-center justify-content-between p-2 bg-white shadow-sm rounded mb-2 border-start border-4" style={{borderColor: room.current_drawer_id === m.user_id ? 'var(--primary)' : 'transparent'}}>
                                            <div className="d-flex align-items-center">
                                                <div onClick={() => setProfileModal({user_id: m.user_id, pic: roomData.profiles[m.user_id]})} className="cursor-pointer">
                                                    {roomData.profiles[m.user_id] ? <img src={roomData.profiles[m.user_id]} className="rounded-circle me-2" width="35" height="35" style={{objectFit: 'cover'}}/> : <i className="fas fa-user-circle fs-2 text-secondary me-2"></i>}
                                                </div>
                                                <div className="d-flex flex-column">
                                                    <span className="fw-bold">{toHex(m.user_id)} {m.user_id === tgId ? ' (You)' : ''}</span>
                                                    <div className="d-flex align-items-center gap-1">
                                                        {m.is_ready ? <span className="badge bg-success shadow-sm" style={{fontSize: '0.65rem'}}><i className="fas fa-check"></i> Ready</span> : null}
                                                        {m.has_given_up ? <span className="badge bg-warning text-dark shadow-sm" style={{fontSize: '0.65rem'}}><i className="fas fa-flag"></i> Gave Up</span> : null}
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="d-flex align-items-center gap-2">
                                                {(room.is_private === 1 && room.creator_id === tgId && m.user_id !== tgId) ? (
                                                    <button className="btn btn-sm btn-danger rounded-circle shadow-sm" onClick={() => setModal({type: 'kick_player', target_id: m.user_id, title: 'Remove Player'})} title="Remove Player"><i className="fas fa-user-times"></i></button>
                                                ) : null}

                                                {(mCall && mCall.status === 'ACTIVE') ? <span className="badge bg-success"><i className="fas fa-phone-volume"></i> In Call</span> : null}
                                                
                                                {(mCall && mCall.status === 'RINGING' && mCall.caller === tgId && mCall.receiver === m.user_id) ? (
                                                    <div className="d-flex align-items-center gap-2">
                                                        <span className="badge bg-warning text-dark"><i className="fas fa-phone"></i> Ringing...</span>
                                                        <button className="btn btn-sm btn-danger rounded-circle shadow-sm" onClick={() => socket.emit('end_call', {call_id: mCall.id})}><i className="fas fa-times"></i></button>
                                                    </div>
                                                ) : null}

                                                {(m.user_id !== tgId && !mCall && !myCall) ? (
                                                    <button className="btn btn-sm btn-outline-primary rounded-circle" onClick={() => onCall(m.user_id)}><i className="fas fa-phone"></i></button>
                                                ) : null}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Whiteboard = ({ roomData, tgId, socket, setModal }) => {
            const canvasRef = useRef(null);
            const [localTimeLeft, setLocalTimeLeft] = useState(0);
            const [preDrawTimeLeft, setPreDrawTimeLeft] = useState(30);
            const [activeColor, setActiveColor] = useState('black');
            
            // Refs prevent unnecessary React re-renders while drawing and tracking fast movements
            const drawingRef = useRef(false);
            const currentLineRef = useRef([]);
            const lastPosRef = useRef({x: 0, y: 0});
            const lastStrokeTime = useRef(0);
            const inkUsedRef = useRef(0);

            const { room, drawings, members } = roomData;
            const isDrawer = room.current_drawer_id === tgId;
            const isDrawingPhase = room.status === 'DRAWING';
            
            const isMeReady = members.find(m => m.user_id === tgId)?.is_ready;
            const readyCount = members.filter(m => m.is_ready).length;
            
            const [wordInput, setWordInput] = useState('');
            const myData = members.find(m => m.user_id === tgId) || {};
            
            // Max Ink allowed (length in px)
            const inkStats = myData.inks?.[activeColor] || {used: 0, extra: 0};
            const maxInk = (INK_CONFIG[activeColor]?.free || 1500) + (inkStats.extra || 0);

            useEffect(() => {
                inkUsedRef.current = inkStats.used || 0;
                updateInkUI();
            }, [inkStats.used, inkStats.extra, activeColor]);

            // Timer for Auto Ready
            useEffect(() => {
                if ((room.status === 'WAITING' || room.status === 'BREAK') && room.break_end_time) {
                    const offset = Date.now() - new Date(roomData.server_time).getTime();
                    const targetTime = new Date(room.break_end_time).getTime() + offset;
                    
                    const updateTime = () => {
                        const diff = targetTime - Date.now();
                        setLocalTimeLeft(Math.max(0, Math.ceil(diff / 1000)));
                    };
                    updateTime();
                    const intv = setInterval(updateTime, 1000);
                    return () => clearInterval(intv);
                }
            }, [room.status, room.break_end_time, roomData.server_time]);

            // Timer for PreDraw Choice
            useEffect(() => {
                if (room.status === 'PRE_DRAW' && room.round_end_time) {
                    const offset = Date.now() - new Date(roomData.server_time).getTime();
                    const targetTime = new Date(room.round_end_time).getTime() + offset;
                    
                    const updateTime = () => {
                        const diff = targetTime - Date.now();
                        setPreDrawTimeLeft(Math.max(0, Math.ceil(diff / 1000)));
                    };
                    updateTime();
                    const intv = setInterval(updateTime, 1000);
                    return () => clearInterval(intv);
                }
            }, [room.status, room.round_end_time, roomData.server_time]);

            const updateInkUI = () => {
                if (!isDrawer || !isDrawingPhase) return;
                const inkLeft = Math.max(0, maxInk - inkUsedRef.current);
                const inkPercent = (inkLeft / maxInk) * 100;
                
                const bar = document.getElementById('inkProgressBar');
                const text = document.getElementById('inkProgressText');
                const buyBtn = document.getElementById('buyInkBtn');
                
                if (bar) {
                    bar.style.width = `${inkPercent}%`;
                    if (inkLeft <= (maxInk * 0.2)) {
                        bar.style.backgroundColor = '';
                        bar.className = 'progress-bar progress-bar-striped progress-bar-animated bg-danger';
                    } else {
                        bar.style.backgroundColor = activeColor === 'white' ? '#e2e8f0' : activeColor;
                        bar.className = 'progress-bar progress-bar-striped progress-bar-animated';
                    }
                }
                if (text) {
                    text.className = inkLeft <= (maxInk * 0.2) ? 'text-danger fw-bold' : 'text-muted';
                    text.innerText = `${Math.floor(inkLeft)} / ${maxInk}`;
                }
                if (buyBtn) {
                    buyBtn.style.display = inkLeft <= 0 ? 'inline-block' : 'none';
                }
            };

            const redraw = useCallback(() => {
                const canvas = canvasRef.current;
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0, canvas.width, canvas.height);
                ctx.lineCap = 'round';
                ctx.lineWidth = 5;
                
                drawings.forEach(jsonStr => {
                    try {
                        const data = JSON.parse(jsonStr);
                        ctx.strokeStyle = data.color === 'white' ? '#ffffff' : (data.color || 'black');
                        data.lines.forEach(l => {
                            ctx.beginPath();
                            ctx.moveTo(l.x0, l.y0);
                            ctx.lineTo(l.x1, l.y1);
                            ctx.stroke();
                        });
                    } catch(e){}
                });
            }, [drawings]);

            useEffect(() => { redraw(); }, [redraw]);

            useEffect(() => {
                const handleLiveDraw = (data) => {
                    let lines, color;
                    if (Array.isArray(data)) {
                        lines = data; color = 'black';
                    } else {
                        lines = data.lines; color = data.color;
                    }
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    ctx.strokeStyle = color === 'white' ? '#ffffff' : (color || '#334155');
                    ctx.lineCap = 'round';
                    ctx.lineWidth = 5;
                    lines.forEach(l => {
                        ctx.beginPath();
                        ctx.moveTo(l.x0, l.y0);
                        ctx.lineTo(l.x1, l.y1);
                        ctx.stroke();
                    });
                };
                socket.on('live_draw', handleLiveDraw);
                return () => socket.off('live_draw', handleLiveDraw);
            }, [socket]);

            const getMousePos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const scaleX = 500 / rect.width;
                const scaleY = 500 / rect.height;
                return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
            };

            const startDraw = (e) => {
                if (!isDrawer || !isDrawingPhase) return;
                e.preventDefault();
                drawingRef.current = true;
                currentLineRef.current = [];
                lastPosRef.current = getMousePos(e);
            };

            const moveDraw = (e) => {
                if (!drawingRef.current) return;
                e.preventDefault();
                const newPos = getMousePos(e);
                
                // Track physical length distance drawn
                const dist = Math.hypot(newPos.x - lastPosRef.current.x, newPos.y - lastPosRef.current.y);
                
                if (inkUsedRef.current + dist > maxInk) {
                    stopDraw(); 
                    setModal({ type: 'confirm_buy_ink', title: 'Refill Ink', color: activeColor, cost: INK_CONFIG[activeColor].cost });
                    return;
                }
                
                inkUsedRef.current += dist;
                updateInkUI();
                
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(lastPosRef.current.x, lastPosRef.current.y);
                ctx.lineTo(newPos.x, newPos.y);
                ctx.strokeStyle = activeColor === 'white' ? '#ffffff' : activeColor;
                ctx.stroke();

                currentLineRef.current.push({x0: lastPosRef.current.x, y0: lastPosRef.current.y, x1: newPos.x, y1: newPos.y});
                lastPosRef.current = newPos;
            };

            const stopDraw = () => {
                if(!drawingRef.current) return;
                drawingRef.current = false;
                
                const now = Date.now();
                if (now - lastStrokeTime.current < 100) return; 
                
                if(currentLineRef.current.length > 0) {
                    socket.emit('draw', { lines: currentLineRef.current, color: activeColor });
                    lastStrokeTime.current = now;
                }
            };

            return (
                <div className="w-100 d-flex flex-column align-items-center">
                    {isDrawer && isDrawingPhase && (
                        <div className="w-100 mb-2 px-2" style={{maxWidth: '500px'}}>
                            
                            <div className="d-flex justify-content-center gap-2 mb-2 flex-wrap">
                                {Object.keys(INK_CONFIG).map(c => (
                                    <div 
                                        key={c}
                                        onClick={() => setActiveColor(c)}
                                        style={{
                                            backgroundColor: c === 'white' ? '#f8fafc' : c,
                                            width: '30px', height: '30px', 
                                            borderRadius: '50%',
                                            border: activeColor === c ? '3px solid #6366f1' : '2px solid #cbd5e1',
                                            cursor: 'pointer',
                                            boxShadow: activeColor === c ? '0 0 10px rgba(99,102,241,0.5)' : 'none'
                                        }}
                                        title={c}
                                    />
                                ))}
                            </div>

                            <div className="d-flex justify-content-between small fw-bold mb-1">
                                <span className="text-primary"><i className="fas fa-tint"></i> <span style={{textTransform: 'capitalize'}}>{activeColor}</span> Ink Level</span>
                                <span id="inkProgressText" className="text-muted">{Math.floor(Math.max(0, maxInk - (inkStats.used || 0)))} / {maxInk}</span>
                            </div>
                            <div className="progress shadow-sm border border-light" style={{height: '14px', borderRadius: '10px'}}>
                                <div id="inkProgressBar" className="progress-bar progress-bar-striped progress-bar-animated bg-primary" 
                                     style={{width: '100%', transition: 'width 0.1s'}}></div>
                            </div>
                            <div className="text-center mt-3" id="buyInkBtn" style={{display: 'none'}}>
                                <button className="btn btn-sm btn-warning rounded-pill fw-bold shadow border border-warning text-dark" onClick={() => setModal({ type: 'confirm_buy_ink', title: 'Refill Ink', color: activeColor, cost: INK_CONFIG[activeColor].cost })}>
                                    <i className="fas fa-plus-circle"></i> Refill {activeColor} ({INK_CONFIG[activeColor].cost} Cred)
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="whiteboard-container">
                        <canvas 
                            ref={canvasRef} width="500" height="500"
                            onMouseDown={startDraw} onMouseMove={moveDraw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
                            onTouchStart={startDraw} onTouchMove={moveDraw} onTouchEnd={stopDraw}
                        />
                        
                        {room.status === 'PRE_DRAW' && isDrawer && (
                            <div className="wb-overlay">
                                <h4 className="text-primary fw-bold">Your turn to draw!</h4>
                                <h5 className="text-danger fw-bold">{preDrawTimeLeft}s</h5>
                                <p className="text-muted small mb-0">Enter a word (3-10 characters)</p>
                                <input type="text" maxLength={10} minLength={3} className="form-control text-center my-3 w-75 rounded-pill" placeholder="Enter a word" value={wordInput} onChange={e => setWordInput(e.target.value)} />
                                <button className="btn btn-primary w-75 rounded-pill shadow-sm" disabled={wordInput.length < 3 || wordInput.length > 10} onClick={() => socket.emit('set_word', {word: wordInput})}>Draw This!</button>
                            </div>
                        )}
                        
                        {room.status === 'PRE_DRAW' && !isDrawer && (
                            <div className="wb-overlay"><h4>Drawer is choosing a word...</h4></div>
                        )}

                        {(room.status === 'REVEAL' || room.status === 'WAITING' || room.status === 'BREAK') && (
                            <div className="wb-overlay">
                                {room.status !== 'WAITING' && (
                                    <>
                                        <h4 className="fw-bold">The word was: <span className="text-success">{room.word_to_draw || 'Skipped'}</span></h4>
                                        {room.last_winner_id ? (
                                            <div className="alert alert-success mt-2 d-flex flex-column align-items-center gap-2">
                                                {roomData.profiles[room.last_winner_id] ? (
                                                    <img src={roomData.profiles[room.last_winner_id]} className="rounded-circle shadow" width="60" height="60" style={{objectFit: 'cover'}}/>
                                                ) : (
                                                    <i className="fas fa-user-circle fs-1 text-secondary"></i>
                                                )}
                                                <span className="fs-5"><b>{toHex(room.last_winner_id)}</b> guessed it!</span>
                                            </div>
                                        ) : <div className="alert alert-warning mt-2 fw-bold">Nobody guessed it!</div>}
                                    </>
                                )}
                                
                                {isMeReady ? (
                                    <h5 className="mt-4 text-muted fw-bold">
                                        {members.length === 1 ? 'Waiting for players to join...' : `Waiting for others... (${readyCount}/${members.length})`}
                                    </h5>
                                ) : (
                                    <button className="btn btn-success rounded-pill px-5 py-2 mt-3 shadow fs-5" onClick={() => socket.emit('set_ready')}><i className="fas fa-check"></i> I'm Ready!</button>
                                )}
                                
                                {room.break_end_time && members.length >= 2 && (
                                    <div className="mt-3 fw-bold text-primary">Game auto-starts in {localTimeLeft}s</div>
                                )}
                            </div>
                        )}

                        {isDrawer && isDrawingPhase && (
                            <div className="position-absolute bottom-0 end-0 m-2 d-flex gap-2">
                                <button className="btn btn-sm btn-light shadow rounded-circle" onClick={() => socket.emit('undo')} title="Undo"><i className="fas fa-undo"></i></button>
                                <button className="btn btn-sm btn-light shadow rounded-circle" onClick={() => socket.emit('redo')} title="Redo"><i className="fas fa-redo"></i></button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ChatBox = ({ chats, profiles, socket, tgId }) => {
            const [input, setInput] = useState('');
            const messagesEndRef = useRef(null);
            
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chats]);

            return (
                <div className="d-flex flex-column h-100" style={{overflow: 'hidden'}}>
                    <div className="panel-body flex-grow-1" style={{overflowY: 'auto'}}>
                        {chats.map(c => (
                            <div key={c.id} className={`msg-box d-flex gap-2 ${c.user_id === 'System' ? 'sys' : ''}`} style={{ borderLeft: c.user_id === tgId ? '4px solid var(--primary)' : '' }}>
                                {c.user_id !== 'System' && (
                                    profiles[c.user_id] ? <img src={profiles[c.user_id]} className="rounded-circle flex-shrink-0" width="28" height="28" style={{objectFit: 'cover'}}/> : <i className="fas fa-user-circle fs-4 text-secondary flex-shrink-0 mt-1"></i>
                                )}
                                <div className="d-flex flex-column w-100">
                                    <small className="fw-bold" style={{fontSize: '0.75rem', color: c.user_id === tgId ? 'var(--primary)' : '#64748b', lineHeight: '1'}}>
                                        {c.user_id === 'System' ? 'System' : toHex(c.user_id)}
                                    </small>
                                    <span style={{marginTop: '2px'}}>{c.message}</span>
                                </div>
                            </div>
                        ))}
                        <div ref={messagesEndRef} />
                    </div>
                    <div className="chat-input-wrapper d-flex mt-auto">
                        <input type="text" className="form-control rounded-start-pill border-0 bg-light" value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && (socket.emit('chat', {message: input}), setInput(''))} placeholder="Type message..." />
                        <button className="btn btn-primary rounded-end-pill px-3" onClick={() => { socket.emit('chat', {message: input}); setInput(''); }}><i className="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            );
        };

        const GuessBox = ({ guesses, profiles, tgId, roomData, socket, setModal }) => {
            const [input, setInput] = useState('');
            const isDrawer = roomData.room.current_drawer_id === tgId;
            const messagesEndRef = useRef(null);

            const myGuessesCount = guesses.filter(g => g.user_id === tgId).length;
            const isFree = myGuessesCount < 4;
            const isBlocked = myGuessesCount >= 6;
            const needsPayment = myGuessesCount === 4;

            const myMemberData = roomData.members.find(m => m.user_id === tgId);
            const hasGivenUp = myMemberData?.has_given_up;

            const totalGuessers = Math.max(0, roomData.members.length - 1);
            const givenUpCount = roomData.members.filter(m => m.user_id !== roomData.room.current_drawer_id && m.has_given_up).length;

            const handleGuessSubmit = () => {
                if (!input.trim() || isBlocked) return;
                if (needsPayment) {
                    setModal({ type: 'confirm_guess_credit', guess: input, title: 'Unlock 2 Extra Guesses?' });
                    setInput('');
                } else {
                    socket.emit('guess', {guess: input});
                    setInput('');
                }
            };

            let placeholderText = '';
            if (isBlocked) placeholderText = 'Max 6 guesses reached.';
            else if (isFree) placeholderText = `Free Guess (${4 - myGuessesCount} left)...`;
            else if (needsPayment) placeholderText = `Unlock 2 Extra Guesses (1 Credit)...`;
            else placeholderText = `Final Extra Guess (Free)...`;

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [guesses]);

            return (
                <div className="d-flex flex-column h-100" style={{overflow: 'hidden'}}>
                    <div className="panel-body flex-grow-1" style={{overflowY: 'auto'}}>
                        {guesses.map(g => (
                            <div key={g.id} className={`msg-box d-flex gap-2 ${g.is_correct ? 'guess-correct' : 'bg-light'}`} style={{ borderLeft: g.user_id === tgId && !g.is_correct ? '4px solid var(--primary)' : '' }}>
                                {profiles[g.user_id] ? <img src={profiles[g.user_id]} className="rounded-circle flex-shrink-0" width="28" height="28" style={{objectFit: 'cover'}}/> : <i className="fas fa-user-circle fs-4 text-secondary flex-shrink-0 mt-1"></i>}
                                <div className="d-flex flex-column w-100">
                                    <small className="fw-bold" style={{fontSize: '0.75rem', color: g.user_id === tgId ? 'var(--primary)' : '#64748b', lineHeight: '1'}}>
                                        {toHex(g.user_id)}
                                    </small>
                                    <span style={{marginTop: '2px'}}>{g.guess_text}</span>
                                </div>
                            </div>
                        ))}
                        <div ref={messagesEndRef} />
                    </div>
                    
                    {roomData.room.status === 'DRAWING' || roomData.room.status === 'PRE_DRAW' ? (
                        <div className="chat-input-wrapper d-flex flex-column mt-auto">
                            <button 
                                className={`btn mb-2 rounded-pill shadow-sm fw-bold ${hasGivenUp ? 'btn-secondary text-light' : 'btn-warning text-dark'}`} 
                                onClick={() => {
                                    setModal({ type: isDrawer ? 'confirm_drawer_give_up' : 'confirm_guesser_give_up', title: 'Confirm Give Up' });
                                }}
                                disabled={!isDrawer && hasGivenUp}
                            >
                                <i className="fas fa-flag"></i> 
                                {isDrawer ? 'Give Up Turn' : (hasGivenUp ? `Voted Give Up (${givenUpCount}/${totalGuessers})` : 'Give Up Round')}
                            </button>

                            {roomData.room.status === 'DRAWING' && (!isDrawer && !hasGivenUp) ? (
                                <div className="d-flex w-100">
                                    <input type="text" className="form-control rounded-start-pill border-0 bg-light" 
                                        value={input} onChange={e=>setInput(e.target.value)} 
                                        onKeyPress={e => e.key === 'Enter' && handleGuessSubmit()} 
                                        disabled={isBlocked}
                                        placeholder={placeholderText} />
                                    <button className="btn btn-success rounded-end-pill px-3" onClick={handleGuessSubmit} disabled={isBlocked}>
                                        <i className="fas fa-check"></i>
                                    </button>
                                </div>
                            ) : null}

                            {(!isDrawer && hasGivenUp) ? (
                                <div className="text-center text-muted p-2 fst-italic small fw-bold">
                                    You've given up. Waiting for others ({givenUpCount}/{totalGuessers})
                                </div>
                            ) : null}

                            {isDrawer ? (
                                <div className="text-center text-muted p-2 fst-italic small fw-bold">
                                    {roomData.room.status === 'PRE_DRAW' ? 'Choose a word to draw!' : 'You are the drawer. Use tools to draw!'}
                                </div>
                            ) : null}
                        </div>
                    ) : null}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
