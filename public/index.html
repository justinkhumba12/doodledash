<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoodleDash</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Link out to our extracted styles -->
    <link rel="stylesheet" href="/css/styles.css">

    <link rel="preload" href="/audio/mgs_notification.mp3" as="audio">
    <link rel="preload" href="/audio/guess_notification.mp3" as="audio">
    
    <!-- Telegram Official WebApp SDK (Required to natively grab users ID and Info) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- Monetag AD NETWORK SCRIPT -->
    <script src='//libtl.com/sdk.js' data-zone='10812134' data-sdk='show_10812134'></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW Registration failed: ', err));
            });
        }
    </script>

    <!-- React and Babel loaded externally without a bundler -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <audio id="mgsSound" src="/audio/mgs_notification.mp3" playsinline preload="auto"></audio>
    <audio id="guessSound" src="/audio/guess_notification.mp3" playsinline preload="auto"></audio>

    <div id="root"></div>

    <!-- Include the components via Babel. Note the load order matters because they rely on each other. -->
    <script type="text/babel" src="/js/components/Views.jsx"></script>
    <script type="text/babel" src="/js/components/ModalManager.jsx"></script>
    <script type="text/babel" src="/js/components/GameComponents.jsx"></script>
    
    <!-- Include the App Bootstrap which defines configs, globals, and renders everything to DOM -->
    <script type="text/babel" src="/js/app.jsx"></script>
</body>
</html>
